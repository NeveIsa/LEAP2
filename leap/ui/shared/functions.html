<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View exposed functions for a LEAP2 experiment.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>">
  <title>Functions — LEAP2</title>
  <script>(function(){var t=localStorage.getItem("leap-theme");if(t==="dark"||(!t&&matchMedia("(prefers-color-scheme:dark)").matches))document.documentElement.classList.add("dark")})()</script>
  <link rel="stylesheet" href="/static/theme.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <script src="/static/theme-toggle.js" defer></script>
  <style>
    .search-bar { position: relative; margin-bottom: 1.25rem; }
    .search-bar .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--color-text-muted); pointer-events: none; opacity: 0.6; }
    .search-bar input { width: 100%; padding: 0.5rem 0.75rem 0.5rem 2.25rem; min-height: 2.75rem; font-size: 0.875rem; font-family: var(--font-sans); border: 1px solid var(--color-border); border-radius: var(--radius); background: var(--color-surface); color: var(--color-text); transition: border-color var(--transition), box-shadow var(--transition); outline: none; }
    .search-bar input:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px var(--color-primary-light); }
    .search-bar input::placeholder { color: var(--color-text-muted); opacity: 0.6; }
    .search-bar .search-clear { position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--color-text-muted); cursor: pointer; padding: 0.25rem; border-radius: 3px; display: none; line-height: 1; transition: color 0.15s; }
    .search-bar .search-clear:hover { color: var(--color-text); }
    .search-bar.has-query .search-clear { display: block; }
    .search-status { font-size: 0.75rem; color: var(--color-text-muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .search-status .count { font-family: var(--font-mono); font-weight: 600; color: var(--color-text); }
    .no-results { text-align: center; padding: 2rem 1rem; color: var(--color-text-muted); font-size: 0.875rem; }
    .no-results code { font-size: 0.8125rem; background: var(--color-bg); padding: 0.1rem 0.3rem; border: 1px solid var(--color-border); border-radius: 3px; }
  </style>
</head>
<body data-page="functions">
  <a class="skip-to-content" href="#main">Skip to content</a>
  <script src="/static/navbar.js"></script>

  <main class="container" id="main">
    <nav class="breadcrumb">
      <a href="/">Experiments</a>
      <span class="breadcrumb-sep">/</span>
      <a href="#" id="bc-exp-link">default</a>
      <span class="breadcrumb-sep">/</span>
      <span>Functions</span>
    </nav>

    <div class="page-header">
      <h1>Exposed Functions</h1>
      <p>All callable RPC functions for this experiment.</p>
    </div>

    <!-- Search Bar -->
    <div class="search-bar" id="search-bar">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Search functions or parameters..." aria-label="Search functions">
      <button class="search-clear" id="search-clear" aria-label="Clear search">&times;</button>
    </div>
    <div id="search-status" class="search-status hidden"></div>

    <div id="error" class="alert alert-error hidden"></div>
    <div id="loading">Loading functions...</div>

    <div id="fn-count" class="fn-count hidden"></div>
    <div id="fn-grid" class="fn-grid"></div>

    <div id="empty" class="empty-state hidden">
      <h2>No functions found</h2>
      <p>Add Python files to this experiment's <code>funcs/</code> directory and reload.</p>
    </div>
  </main>

  <script src="/static/footer.js"></script>
  <script>
    (function () {
      var expName = window.LEAP_EXP || new URLSearchParams(window.location.search).get("exp") || "default";
      var bcLink = document.getElementById("bc-exp-link");
      if (bcLink) { bcLink.href = "/exp/" + expName + "/ui/dashboard.html"; bcLink.textContent = expName; }

      var errorEl = document.getElementById("error");
      var loadingEl = document.getElementById("loading");
      var gridEl = document.getElementById("fn-grid");
      var countEl = document.getElementById("fn-count");
      var emptyEl = document.getElementById("empty");

      fetch("/exp/" + expName + "/functions")
        .then(function (res) {
          if (!res.ok) throw new Error("Failed to load functions (HTTP " + res.status + ")");
          return res.json();
        })
        .then(function (funcs) {
          loadingEl.classList.add("hidden");
          var names = Object.keys(funcs).sort();

          if (names.length === 0) {
            emptyEl.classList.remove("hidden");
            return;
          }

          countEl.textContent = names.length + " function" + (names.length !== 1 ? "s" : "");
          countEl.classList.remove("hidden");

          names.forEach(function (name) {
            var info = funcs[name];
            var card = document.createElement("div");
            card.className = "fn-card";

            var header = document.createElement("div");
            header.className = "fn-card-header";

            var nameEl = document.createElement("span");
            nameEl.className = "fn-card-name";
            nameEl.textContent = name;
            header.appendChild(nameEl);

            var badges = document.createElement("div");
            badges.className = "fn-badges";
            if (info.nolog) {
              var b = document.createElement("span");
              b.className = "badge badge-nolog";
              b.textContent = "@nolog";
              badges.appendChild(b);
            }
            if (info.noregcheck) {
              var b2 = document.createElement("span");
              b2.className = "badge badge-noregcheck";
              b2.textContent = "@noregcheck";
              badges.appendChild(b2);
            }
            if (info.adminonly) {
              var ba = document.createElement("span");
              ba.className = "badge badge-adminonly";
              ba.textContent = "@adminonly";
              badges.appendChild(ba);
            }
            var rl = info.ratelimit;
            if (rl !== false) {
              var b3 = document.createElement("span");
              b3.className = "badge badge-ratelimit";
              b3.textContent = rl === "default" ? "120/minute" : rl;
              badges.appendChild(b3);
            }
            if (badges.children.length) header.appendChild(badges);

            card.appendChild(header);

            var sig = document.createElement("div");
            sig.className = "fn-card-sig";
            // Highlight arguments by finding a word immediately followed by an equals or a colon or comma inside parentheses
            var parsedSig = (info.signature || "(...)").replace(/([a-zA-Z0-9_]+)(?=\s*[=:,)])/g, "<span class='fn-arg'>$1</span>");
            sig.innerHTML = "<span class='fn-card-sig-kw'>def</span> " + name + "<span class='fn-card-sig-params'>" + parsedSig + "</span>";
            card.appendChild(sig);

            var copyBtn = document.createElement("button");
            copyBtn.className = "fn-card-copy";
            copyBtn.title = "Copy JS client snippet";
            copyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
            copyBtn.onclick = function() {
              var argsStr = (info.signature || "").replace(/^\(/, "").replace(/\)$/, "").trim();
              if (argsStr === "..." || !argsStr) argsStr = "";
              var keys = argsStr.split(",").map(function(s){return s.split(/[=:]/)[0].trim()}).filter(function(k){return k && k!=="self" && k!=="state"});
              var payload = keys.length ? keys.map(function(k){return k + ": null"}).join(", ") : "";
              var snippet = "await client.call(\"" + name + "\"" + (payload ? ", { " + payload + " }" : "") + ");";
              navigator.clipboard.writeText(snippet);
              var oldSvg = copyBtn.innerHTML;
              copyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
              copyBtn.classList.add("copied");
              setTimeout(function(){
                copyBtn.innerHTML = oldSvg;
                copyBtn.classList.remove("copied");
              }, 1500);
            };
            card.appendChild(copyBtn);

            if (info.doc) {
              var doc = document.createElement("div");
              doc.className = "fn-card-doc";
              doc.textContent = info.doc;
              card.appendChild(doc);
            }

            // Stash search terms in data attribute so we can apply live filter extremely fast
            card.dataset.searchText = (name + " " + (info.doc || "") + " " + (info.signature || "")).toLowerCase();
            gridEl.appendChild(card);
          });

          // Search logic
          var searchInput = document.getElementById("search-input");
          var searchClear = document.getElementById("search-clear");
          var searchStatus = document.getElementById("search-status");
          var searchBar = document.getElementById("search-bar");
          var noResults = document.getElementById("empty");
          var allCards = Array.from(gridEl.querySelectorAll(".fn-card"));

          function applyFilter() {
            var q = searchInput.value.trim().toLowerCase();
            searchBar.classList.toggle("has-query", q.length > 0);
            var visibleCount = 0;
            allCards.forEach(function(card) {
              if (card.dataset.searchText.includes(q)) {
                card.style.display = "";
                visibleCount++;
                // Add highlight logic (opt-in visually optional but we show cards normally)
              } else {
                card.style.display = "none";
              }
            });

            if (q) {
              countEl.classList.add("hidden");
              searchStatus.classList.remove("hidden");
              searchStatus.innerHTML = '<span class="count">' + visibleCount + '</span> of ' + allCards.length + ' matching <code>' + escapeHtml(searchInput.value) + '</code>';
              if (visibleCount === 0) noResults.classList.remove("hidden");
              else noResults.classList.add("hidden");
            } else {
              countEl.classList.remove("hidden");
              searchStatus.classList.add("hidden");
              noResults.classList.add("hidden");
            }
          }
          
          function escapeHtml(s) {
            var d = document.createElement("div");
            d.textContent = s;
            return d.innerHTML;
          }

          var debounceTimer;
          searchInput.addEventListener("input", function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(applyFilter, 100);
          });
          searchClear.addEventListener("click", function() {
            searchInput.value = "";
            applyFilter();
            searchInput.focus();
          });
          searchInput.addEventListener("keydown", function(e) {
            if (e.key === "Escape") { searchInput.value = ""; applyFilter(); }
          });

        })
        .catch(function (err) {
          loadingEl.classList.add("hidden");
          errorEl.textContent = err.message;
          errorEl.classList.remove("hidden");
        });
    })();
  </script>
</body>
</html>
